<?xml version="1.0" encoding="UTF-8"?>
<!-- Decoration carte 2 : Renoncule orange dense + 2 feuilles -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Decoration aquarelle : renoncule orange">
  <defs>
    <filter id="wash-card-ranunculus" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0.55"/>
    </filter>
  </defs>

  <!-- Feuille gauche -->
  <g transform="translate(10 68) rotate(-30) scale(0.5)" opacity="0.78">
    <path d="M25,5 C12,18 8,42 14,68 C18,85 23,96 25,96 C27,96 32,85 36,68 C42,42 38,18 25,5 Z" fill="#9CB382" opacity="0.85"/>
    <path d="M25,10 C25,30 25,60 25,90" stroke="#6F8556" stroke-width="0.8" stroke-linecap="round" opacity="0.7" fill="none"/>
  </g>
  <!-- Feuille droite -->
  <g transform="translate(75 72) rotate(45) scale(0.5)" opacity="0.78">
    <path d="M25,8 C15,22 10,46 14,72 C17,86 23,94 25,94 C27,94 31,86 36,72 C42,46 35,22 25,8 Z" fill="#88A06F" opacity="0.82"/>
    <path d="M25,14 C26,32 27,60 25,88" stroke="#5D7048" stroke-width="0.8" stroke-linecap="round" opacity="0.65" fill="none"/>
  </g>

  <!-- Renoncule centrale -->
  <g transform="translate(60 60)">
    <circle cx="0" cy="2" r="42" fill="#F8B783" opacity="0.4" filter="url(#wash-card-ranunculus)"/>

    <!-- Outer ring 8 small petals -->
    <g fill="#F08D3F" opacity="0.92">
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(45 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(90 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(135 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(180 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(225 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(270 0 2)"/>
      <path d="M0,2 C-11,6 -16,-13 0,-22 C16,-13 11,6 0,2 Z" transform="rotate(315 0 2)"/>
    </g>

    <!-- Mid ring 6 small darker petals -->
    <g fill="#D87A2D" opacity="0.9">
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(22 0 2)"/>
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(82 0 2)"/>
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(142 0 2)"/>
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(202 0 2)"/>
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(262 0 2)"/>
      <path d="M0,2 C-6,3 -9,-11 0,-16 C9,-11 6,3 0,2 Z" transform="rotate(322 0 2)"/>
    </g>

    <!-- Coeur dense -->
    <circle cx="0" cy="2" r="7" fill="#A85D1F" opacity="0.85"/>
    <circle cx="-1" cy="1" r="2.8" fill="#6E3C0F" opacity="0.78"/>
  </g>
</svg>
