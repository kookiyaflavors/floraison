<?xml version="1.0" encoding="UTF-8"?>
<!-- Decoration carte 3 : Marguerite blanche coeur jaune + 2 feuilles -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Decoration aquarelle : marguerite blanche">
  <defs>
    <filter id="wash-card-daisy" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="0.55"/>
    </filter>
  </defs>

  <!-- Feuille gauche -->
  <g transform="translate(8 65) rotate(-32) scale(0.5)" opacity="0.78">
    <path d="M25,5 C12,18 8,42 14,68 C18,85 23,96 25,96 C27,96 32,85 36,68 C42,42 38,18 25,5 Z" fill="#9CB382" opacity="0.85"/>
    <path d="M25,10 C25,30 25,60 25,90" stroke="#6F8556" stroke-width="0.8" stroke-linecap="round" opacity="0.7" fill="none"/>
  </g>
  <!-- Feuille droite -->
  <g transform="translate(75 68) rotate(42) scale(0.5)" opacity="0.78">
    <path d="M25,8 C15,22 10,46 14,72 C17,86 23,94 25,94 C27,94 31,86 36,72 C42,46 35,22 25,8 Z" fill="#88A06F" opacity="0.82"/>
    <path d="M25,14 C26,32 27,60 25,88" stroke="#5D7048" stroke-width="0.8" stroke-linecap="round" opacity="0.65" fill="none"/>
  </g>

  <!-- Marguerite centrale -->
  <g transform="translate(60 60)">
    <!-- Halo aquarelle leger -->
    <circle cx="0" cy="2" r="42" fill="#FBF3E3" opacity="0.5" filter="url(#wash-card-daisy)"/>

    <!-- 12 petales etroits blanc casse -->
    <g fill="#FBF3E3" opacity="0.95" stroke="#E8DBC0" stroke-width="0.7">
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(30 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(60 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(90 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(120 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(150 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(180 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(210 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(240 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(270 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(300 0 0)"/>
      <path d="M0,0 C-3,-6 -4,-26 -2,-44 C-1,-50 1,-50 2,-44 C4,-26 3,-6 0,0 Z" transform="rotate(330 0 0)"/>
    </g>

    <!-- Coeur jaune -->
    <circle cx="0" cy="0" r="10" fill="#F4C430" opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="#D9A91C" opacity="0.55"/>

    <!-- Akenes (petits points centraux) -->
    <g fill="#A37710" opacity="0.85">
      <circle cx="-2" cy="-2" r="1.1"/>
      <circle cx="2" cy="-2" r="1.1"/>
      <circle cx="0" cy="1" r="1.1"/>
      <circle cx="-3" cy="2" r="1.1"/>
      <circle cx="3" cy="2" r="1.1"/>
      <circle cx="-5" cy="-1" r="0.9"/>
      <circle cx="5" cy="-1" r="0.9"/>
    </g>
  </g>
</svg>
