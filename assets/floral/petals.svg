<?xml version="1.0" encoding="UTF-8"?>
<!--
  Library de petales filants individuels. ViewBox unique 0 0 60 100 par petale.
  Referencee via <svg><use href="petals.svg#petal-rose-1"/></svg> dans la page.
  Format : petale asymetrique Bezier, ratio ~1:2 longueur:largeur.
  Couleurs : 5 nuances de la palette Floraison (rose poudre, corail, orange, jaune, rouge hibiscus).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="wash-petal-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>

    <!-- ===== ROSE POUDRE ===== -->
    <symbol id="petal-rose-1" viewBox="0 0 60 100" overflow="visible">
      <path d="M30,4 C18,12 14,35 18,62 C22,82 28,94 30,96 C32,94 38,82 42,62 C46,35 42,12 30,4 Z" fill="#F8C8D5" opacity="0.45" filter="url(#wash-petal-soft)"/>
      <path d="M30,8 C20,16 16,38 20,62 C24,80 28,92 30,92 C32,92 36,80 40,62 C44,38 40,16 30,8 Z" fill="#F2A7B8" opacity="0.93"/>
      <path d="M30,22 C26,40 26,68 30,86 C34,68 34,40 30,22 Z" fill="#E68FA7" opacity="0.65"/>
    </symbol>

    <symbol id="petal-rose-2" viewBox="0 0 60 100" overflow="visible">
